name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  python-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Syntax-check upscaler script
        run: python3 -m py_compile ai_engine/upscaler.py

  unit-tests-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: "6.7.3"
          modules: "qt5compat qtmultimedia"
      - name: Configure tests
        run: cmake -S . -B build -DUPSNEYRO_BUILD_TESTS=ON -DCMAKE_BUILD_TYPE=Release
      - name: Build test target
        run: cmake --build build --target test_projectmanager --config Release
      - name: Run tests
        run: ctest --test-dir build --output-on-failure -R projectmanager -C Release

  unit-tests-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            ninja-build \
            libgl1-mesa-dev \
            libxkbcommon-x11-0 \
            libxkbcommon-dev \
            libx11-xcb-dev \
            libxcb1-dev \
            libxcb-cursor0 \
            libxcb-keysyms1 \
            libxcb-render-util0 \
            libxcb-icccm4 \
            libxcb-image0 \
            libxcb-randr0 \
            libxcb-shape0 \
            libxcb-sync1 \
            libxcb-xfixes0 \
            libxcb-xinerama0 \
            libfontconfig1 \
            libdbus-1-3
      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: "6.7.3"
          host: "linux"
          target: "desktop"
          arch: "gcc_64"
          modules: "qt5compat qtmultimedia"
      - name: Configure tests
        run: cmake -S . -B build -DUPSNEYRO_BUILD_TESTS=ON -DCMAKE_BUILD_TYPE=Release -G Ninja
      - name: Build test target
        run: cmake --build build --target test_projectmanager
      - name: Run tests
        run: ctest --test-dir build --output-on-failure -R projectmanager
